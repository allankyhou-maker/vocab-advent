<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字大冒險 - 題庫中央控制台</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; margin-top: 0; }
        p { color: #7f8c8d; line-height: 1.6; margin-bottom: 25px; }
        
        /* 💡 修正後的上傳區塊樣式 */
        .upload-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            border: 2px dashed #3498db; 
            border-radius: 10px; 
            padding: 30px; 
            background: #ebf5fb; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            width: 100%;
        }
        .upload-area:hover { background: #d6eaf8; }
        .upload-area input { display: none; }
        
        .status { padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.loading { background: #fff3cd; color: #856404; display: block; }

        .upload-btn { background-color: #3498db; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 0 #2980b9; transition: 0.1s; }
        .upload-btn:active { transform: translateY(4px); box-shadow: none; }
        .upload-btn:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
        
        #file-name-display { font-size: 14px; color: #2980b9; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>⚙️ 題庫中央控制台</h1>
        <p>請上傳最新的 <b>master_wordbank.json</b> 檔案。<br>系統將自動覆蓋雲端題庫，孩子們重新整理網頁即可看到新單字！</p>
        
        <label class="upload-area" id="drop-zone">
            <div style="font-size: 40px; margin-bottom: 10px;">📁</div>
            <div style="font-size: 18px; font-weight: bold; color: #3498db;">點擊選擇 JSON 檔案</div>
            <div id="file-name-display">尚未選擇檔案</div>
            <input type="file" id="json-upload" accept=".json">
        </label>

        <div id="status-message" class="status"></div>
        <button id="submit-btn" class="upload-btn" disabled>發射至雲端！🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // 💡 你的 Firebase 金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyCXjVOM0EPHB6ZKlizyI-T6Y8satD8llEo",
            authDomain: "vocab-adventure-d6a5a.firebaseapp.com",
            projectId: "vocab-adventure-d6a5a",
            storageBucket: "vocab-adventure-d6a5a.firebasestorage.app",
            messagingSenderId: "704154289545",
            appId: "1:704154289545:web:8226afd8db826cc19f8d58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let parsedData = null;
        const fileInput = document.getElementById('json-upload');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-message');
        const fileNameDisplay = document.getElementById('file-name-display');

        // 1. 監聽檔案選擇
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.innerText = `📄 已選取：${file.name}`;
            const reader = new FileReader();

            reader.onload = function(event) {
                try {
                    parsedData = JSON.parse(event.target.result);
                    // 簡單檢查一下格式是不是物件
                    if (typeof parsedData !== 'object' || parsedData === null) throw new Error("檔案格式不正確");
                    
                    showStatus("success", `✅ 解析成功！共讀取到 ${Object.keys(parsedData).length} 個題庫類別。`);
                    submitBtn.disabled = false;
                } catch (error) {
                    showStatus("error", "❌ JSON 解析失敗，請檢查檔案格式是否正確！");
                    submitBtn.disabled = true;
                }
            };
            reader.readAsText(file);
        });

        // 2. 點擊發射按鈕
        submitBtn.addEventListener('click', async () => {
            if (!parsedData) return;
            
            submitBtn.disabled = true;
            submitBtn.innerText = "上傳中...";
            showStatus("loading", "⏳ 正在與 Firebase 連線同步中...");

            try {
                // 💡 把整個解析後的 JSON 物件，覆蓋到 wordBanks 集合裡的 all_data 文件
                await setDoc(doc(db, "wordBanks", "all_data"), parsedData);
                
                showStatus("success", "🎉 發射成功！雲端題庫已更新完畢。");
                setTimeout(() => {
                    submitBtn.innerText = "發射至雲端！🚀";
                    submitBtn.disabled = false;
                }, 2000);
            } catch (error) {
                console.error(error);
                showStatus("error", "❌ 上傳失敗：無權限或網路錯誤。");
                submitBtn.innerText = "重試一次";
                submitBtn.disabled = false;
            }
        });

        function showStatus(type, message) {
            statusMsg.className = `status ${type}`;
            statusMsg.innerText = message;
        }
    </script>
</body>
</html>
